name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-validate:
    name: Validate YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate YAML workflow files
        run: |
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              || { echo "FAIL: $f is not valid YAML"; exit 1; }
            echo "PASS: $f"
          done

  markdown-links:
    name: Validate internal markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check markdown internal links resolve
        run: |
          ERRORS=0
          find . -name '*.md' -type f | sort | while read -r md; do
            grep -oE '\[([^]]+)\]\(\.?/([^)]+)\)' "$md" 2>/dev/null || continue
            grep -oE '\[([^]]+)\]\(\.?/([^)]+)\)' "$md" | while IFS= read -r link; do
              # Extract path: [text](path) → path
              path="${link##*](}"
              path="${path%)}"
              path="${path#./}"
              if [ ! -e "$path" ]; then
                echo "FAIL: $md links to missing $path"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "$ERRORS link(s) failed"
            exit 1
          fi
          echo "All internal markdown links resolve."

  audit:
    name: Template compliance audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run compliance audit
        run: |
          set -e
          bash .omp/skills/template-guide/scripts/audit.sh
