name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-validate:
    name: Validate YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate YAML workflow files
        run: |
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              || { echo "FAIL: $f is not valid YAML"; exit 1; }
            echo "PASS: $f"
          done

  audit:
    name: Template compliance audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run compliance audit
        run: |
          set -e
          bash .omp/skills/template-guide/scripts/audit.sh

      - name: Check for placeholder comments
        run: |
          # Skip .omp/ (internal tooling), .github/PULL_REQUEST_TEMPLATE.md (template), node_modules
          PLACEMENTS=$(grep -rn '<!--\s*\(e\.g\.\|TODO\|FIXME\|replace me\|fill in\)' \
            --include='*.md' \
            --exclude-dir=.omp \
            --exclude='.github/PULL_REQUEST_TEMPLATE.md' \
            --exclude='AGENTS.md' \
            . || true)
          if [ -n "$PLACEMENTS" ]; then
            echo "::error::HTML comment placeholders found in markdown files:"
            echo "$PLACEMENTS"
            echo ""
            echo "Replace placeholders with actual content or remove them."
            exit 1
          fi
          echo "PASS: no placeholder comments found"
