name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: |
            extends: ['@commitlint/config-conventional']

  changelog-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check CHANGELOG.md is updated
        uses: dangoslen/changelog-enforcer@v3
        with:
          changeLogPath: CHANGELOG.md
          missingUpdateErrorMessage: |
            Please update CHANGELOG.md with your changes under the [Unreleased] section.
            See CONTRIBUTING.md for guidelines.

  blob-size-policy:
    uses: ./.github/workflows/blob-size-policy.yml

  test:
    runs-on: ubuntu-latest
    # Replace the steps below with your project's test commands.
    # Uncomment and customize for your language:
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder — configure for your project
        run: |
