name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-validate:
    name: Validate YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate YAML workflow files
        run: |
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              || { echo "FAIL: $f is not valid YAML"; exit 1; }
            echo "PASS: $f"
          done

  audit:
    name: Template compliance audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run compliance audit
        run: |
          set -e
          bash .omp/skills/template-guide/scripts/audit.sh