name: Changelog Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: changelog-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: zattoo/changelog@v1
        with:
          token: ${{ github.token }}